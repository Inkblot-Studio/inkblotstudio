name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Contract smoke test
        run: npm run test:contracts

      - name: Build web
        run: npm run build

      - name: Integration smoke
        run: bash infra/scripts/ci-smoke.sh

      - name: Set image tag
        id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/web:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/web:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config

      - name: Deploy
        run: bash infra/scripts/deploy.sh "${{ github.event.inputs.environment }}"

      - name: Pin deployment image
        run: |
          NAMESPACE="inkblot-web-${{ github.event.inputs.environment }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/web:${{ needs.build.outputs.image_tag }}"
          kubectl set image deployment/web-app web="${IMAGE}" -n "${NAMESPACE}"
          kubectl set image deployment/lead-worker worker="${IMAGE}" -n "${NAMESPACE}"
          kubectl rollout status deployment/web-app -n "${NAMESPACE}"
          kubectl rollout status deployment/lead-worker -n "${NAMESPACE}"
