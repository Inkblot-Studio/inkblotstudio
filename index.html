    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300..600;9..144,1,300..600&family=IBM+Plex+Mono:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --scroll-raw: 0;
        --journey-section: 0;
        --journey-local: 0;
        --journey-work-ui: 0;
        --journey-edge: 0;
        /* Warm rail (no cool blue) — frame + audio tint follow act */
        --journey-rail: #c4b2a0;
        --at-neon-flicker: 1;
        --at-neon-pulse: 0.45;
        --dominant: #2563EB;
        --support: #60A5FA;
        --primary: #2563EB;
        --primary-hover: #60A5FA;
        --accent: #10B981;
        --background: #020617;
        --surface: #0B1220;
        --text-primary: #F8FAFC;
        --text-muted: #CBD5E1;
        --border: #1E293B;
      }

      /* React splash mounts into #splash-root (see src/ui/loading/LoadingScreen.tsx) */
      #splash-root {
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: auto;
      }

      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* min-height (not height:100%) so in-flow #virtual-scroll-space can grow document scroll range */
      html {
        width: 100%;
        min-height: 100%;
      }

      body {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--background);
        color: var(--text-primary);
        font-family: 'Outfit', system-ui, sans-serif;
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      /* Vertical pill thumb on the viewport edge (replaces native bar). */
      .custom-scroll-rail {
        position: fixed;
        top: 0;
        right: 0;
        width: 12px;
        height: 100dvh;
        max-height: 100vh;
        z-index: 14;
        pointer-events: none;
        padding: max(12px, env(safe-area-inset-top))
          max(5px, env(safe-area-inset-right))
          max(12px, env(safe-area-inset-bottom))
          0;
        box-sizing: border-box;
      }

      .custom-scroll-track {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .custom-scroll-edge {
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 1px;
        margin-left: -0.5px;
        background: rgba(0, 0, 0, 0.88);
        pointer-events: none;
      }

      .custom-scroll-thumb {
        position: absolute;
        left: 50%;
        top: 0;
        width: 8px;
        margin-left: -4px;
        border-radius: 999px;
        background: color-mix(in srgb, #e8eaef 92%, #94a3b8);
        min-height: 20px;
        transform: translateY(0);
        will-change: transform, height;
        opacity: 0;
        transition: opacity 0.25s ease;
      }

      /* 3D Canvas fixed in background */
      #canvas-container {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      #app-root {
        display: contents;
      }

      /* 3D HUD Canvas for Audio Button */
      #hud-container {
        position: fixed;
        inset: 0;
        z-index: 6;
        pointer-events: none;
      }

      /* Capture mouse for the 3D scene globally */
      #interaction-layer {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: auto;
      }

      /* UI Overlay on top */
      #ui-layer {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding: max(2.9rem, calc(env(safe-area-inset-top) + 0.7rem))
          max(80px, env(safe-area-inset-right))
          1.5rem
          max(80px, env(safe-area-inset-left));
        transition: z-index 0s step-end;
      }

      /* Keep nav (menu) above drawer so the same control can open + close */
      body.site-drawer-open #ui-layer {
        z-index: 30;
        transition: z-index 0s step-start;
      }

      .top-chrome {
        display: flex;
        flex-wrap: nowrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        width: 100%;
        pointer-events: none;
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-decoration: none;
        color: inherit;
        pointer-events: auto;
        padding: 0.14rem 0;
        margin: 0;
        align-self: flex-start;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      .brand-row__mark {
        height: 28px;
        width: auto;
        opacity: 0.92;
        display: block;
        flex-shrink: 0;
      }

      .brand-row__mark--dark {
        display: none;
      }

      /* Light contact sheet: dark wordmark + dark mark; white glyph would disappear */
      body.contact-page-open .brand-row__mark--light {
        display: none;
      }

      body.contact-page-open .brand-row__mark--dark {
        display: block;
      }

      .brand-row .logo-text {
        display: flex;
        align-items: baseline;
        gap: 0.25rem;
      }

      .brand-row .inkblot {
        font-family: 'Outfit', system-ui, sans-serif;
        font-weight: 600;
        letter-spacing: 0.05em;
        font-size: 1.15rem;
        text-transform: uppercase;
      }

      .brand-row .studio {
        font-family: 'Fraunces', Georgia, serif;
        font-style: normal;
        font-weight: 300;
        letter-spacing: 0.1em;
        font-size: 0.82rem;
        text-transform: uppercase;
        opacity: 0.78;
      }

      .brand-row .tm {
        font-size: 0.55rem;
        opacity: 0.45;
        transform: translateY(-0.35rem);
      }

      .nav-stack-top-right {
        --nav-island-w: min(90vw, 22rem);
        --nav-player-w: var(--nav-island-w);
        /* Glass kit + accent (warm; flower journey varies --journey-rail) */
        --nav-accent: #b5a08e;
        --nav-accent-2: #9a8a7a;
        --nav-ink: #f1f5f9;
        --nav-ink-dim: color-mix(in srgb, #cbd5e1 78%, var(--nav-accent));
        --nav-glass-fill: rgba(2, 8, 18, 0.34);
        --nav-glass-deep: rgba(2, 6, 14, 0.88);
        --nav-chrome-glow: 0.48;
        --nav-link-ring: color-mix(in srgb, #ffffff 70%, var(--nav-ink) 30%);
        flex: 0 0 auto;
        margin-left: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        pointer-events: none;
        position: relative;
        overflow: visible;
        transform-origin: 100% 0%;
        transform-style: preserve-3d;
        will-change: transform;
        transform: perspective(1400px)
          rotateX(calc(var(--nav-warp, 0) * -5.5deg * var(--nav-dir, 1)))
          translateY(calc(var(--nav-warp, 0) * -2.5px * var(--nav-dir, 1)))
          skewX(calc(var(--nav-warp, 0) * 11deg * var(--nav-dir, 1)))
          scaleX(calc(1 + var(--nav-warp, 0) * 0.024));
        transition: transform 0.1s ease-out;
      }

      body.journey-flower-active .nav-stack-top-right {
        --nav-accent: var(--journey-rail, #c4b2a0);
        --nav-accent-2: color-mix(in srgb, var(--journey-rail) 50%, #b5a08e);
        --nav-chrome-glow: 0.62;
      }

      .nav-stack-top-right > * {
        pointer-events: auto;
      }

      .nav-stack-top-right::before {
        display: none;
      }

      .nav-text-cluster {
        position: relative;
        z-index: 3;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 0.35rem 1.15rem;
        width: var(--nav-island-w);
        min-width: min(100%, var(--nav-island-w));
        max-width: var(--nav-island-w);
        box-sizing: border-box;
        padding: 0.1rem 0;
        perspective: 720px;
      }

      /* Nav label: two stacked rows — letter stagger + simple pill border on hover/focus. */
      .nav-text-link {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        margin: 0;
        padding: 0.22rem 0.5rem;
        min-height: 1.5rem;
        text-decoration: none;
        color: var(--nav-ink);
        border: 1px solid transparent;
        border-radius: 999px;
        background: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        white-space: nowrap;
        opacity: 0.9;
        pointer-events: auto;
        transition:
          opacity 0.2s ease,
          border-color 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      }

      .nav-text-link:hover,
      .nav-text-link:focus-visible {
        opacity: 1;
        border-color: var(--nav-link-ring);
      }

      .nav-text-link:hover:not(:focus-visible) {
        outline: none;
      }

      .nav-text-link:focus-visible {
        outline: 2px solid color-mix(in srgb, #ffffff 88%, var(--nav-ink) 5%);
        outline-offset: 3px;
      }

      .nav-text-link__face {
        position: relative;
        display: inline-grid;
        grid-template: 1fr / 1fr;
        place-items: center;
        min-height: 1.1em;
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
        border-radius: inherit;
      }

      .nav-text-link__row {
        grid-area: 1 / 1;
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        justify-content: center;
        align-items: center;
        gap: 0.12em;
        font-size: clamp(0.68rem, 1.4vw, 0.8rem);
        font-weight: 400;
        letter-spacing: 0;
        text-transform: uppercase;
        color: inherit;
        line-height: 1.2;
        will-change: transform;
      }

      .nav-text-link__ch {
        display: inline-block;
        transition: transform 0.46s cubic-bezier(0.32, 0.72, 0, 1);
        transition-delay: calc(var(--li, 0) * 44ms);
      }

      .nav-text-link__row--sans .nav-text-link__ch {
        transform: translate3d(0, 0, 0);
      }

      .nav-text-link__row--serif .nav-text-link__ch {
        font-family: 'Fraunces', Georgia, serif;
        font-style: italic;
        font-weight: 300;
        font-feature-settings: 'ss01' 1;
        transform: translate3d(0, -110%, 0);
      }

      .nav-text-link__row--sans {
        font-family: 'Outfit', system-ui, sans-serif;
      }

      .nav-text-link:hover .nav-text-link__row--sans .nav-text-link__ch,
      .nav-text-link:focus-visible .nav-text-link__row--sans .nav-text-link__ch {
        transform: translate3d(0, 110%, 0);
      }

      .nav-text-link:hover .nav-text-link__row--serif .nav-text-link__ch,
      .nav-text-link:focus-visible .nav-text-link__row--serif .nav-text-link__ch {
        transform: translate3d(0, 0, 0);
      }

      .nav-text-link:active .nav-text-link__ch {
        transition-duration: 0.2s;
      }

      .nav-text-cluster__inline {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 0.35rem 0.5rem;
        min-width: 0;
        flex: 0 1 auto;
        max-width: min(28rem, 100%);
        box-sizing: border-box;
        overflow: visible;
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        /* Slight delay on opacity/visibility when revealing after drawer close (see toggle rule). */
        transition:
          opacity 0.24s cubic-bezier(0.25, 0.48, 0.35, 0.99) 0.16s,
          visibility 0s linear 0.16s;
      }

      /* Drawer: hide labels while the menu “reads” as open. `site-drawer-toggle-on` clears as soon
         as close starts (not when the panel finishes). Reveal uses the base transition delay so Work
         / Contact trail the hamburger slightly instead of popping in together. */
      @media (min-width: 769px) {
        body.site-drawer-toggle-on .nav-text-cluster__inline {
          opacity: 0;
          pointer-events: none;
          visibility: hidden;
          transition: opacity 0.18s ease, visibility 0s linear 0.18s;
        }
      }

      /* Top nav: + → ×; white disc on dark scene — icon spin + bouncy scale on hover */
      .nav-menu-btn {
        position: relative;
        overflow: visible;
        isolation: isolate;
        flex: 0 0 auto;
        width: 2.35rem;
        height: 2.35rem;
        min-width: 2.35rem;
        margin: 0 0 0 0.2rem;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #e2e8f0;
        border-radius: 50%;
        background: #fff;
        color: #1a1814;
        box-shadow: none;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        pointer-events: auto;
        opacity: 1;
        perspective: 100px;
        transform-style: preserve-3d;
        transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
      }

      .nav-menu-btn:hover,
      .nav-menu-btn:focus-visible {
        background: #faf9f7;
        box-shadow: none;
        color: #0c0a08;
        border-color: #d4d0ca;
      }

      /* Open drawer: read as “closed / active” control on the dark scene */
      body.site-drawer-toggle-on .nav-menu-btn {
        background: #0a0a0a;
        color: #f5f0eb;
        border-color: #0a0a0a;
        box-shadow: none;
      }

      body.site-drawer-toggle-on .nav-menu-btn:hover,
      body.site-drawer-toggle-on .nav-menu-btn:focus-visible {
        background: #121110;
        color: #fff;
        border-color: #1a1810;
      }

      .nav-menu-btn:focus-visible {
        outline: 2px solid rgba(26, 24, 20, 0.22);
        outline-offset: 2px;
      }

      .nav-menu-btn__glyph {
        position: relative;
        z-index: 1;
        width: 1.2rem;
        height: 1.2rem;
        display: block;
        pointer-events: none;
        color: inherit;
        transform-style: preserve-3d;
        transform: translate3d(0, 0, 0.1px);
      }

      .nav-menu-btn__morph {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible;
        transform-style: preserve-3d;
        transform-box: fill-box;
        transform-origin: 50% 50%;
        transition: transform 0.55s cubic-bezier(0.3, 1.45, 0.35, 1);
      }

      .nav-menu-btn:hover .nav-menu-btn__morph,
      .nav-menu-btn:focus-visible .nav-menu-btn__morph {
        transform: rotate(180deg) scale(1.1);
      }

      .nav-menu-btn__plus {
        transform: rotate(0deg);
        transform-origin: 0 0;
        transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .nav-menu-btn__plus line {
        stroke: currentColor;
        stroke-width: 1.65;
        stroke-linecap: round;
      }

      body.site-drawer-toggle-on .nav-menu-btn__plus {
        transform: rotate(45deg);
      }

      @media (prefers-reduced-motion: reduce) {
        .nav-menu-btn__morph {
          transition: transform 0.18s ease;
        }
        .nav-menu-btn:hover .nav-menu-btn__morph,
        .nav-menu-btn:focus-visible .nav-menu-btn__morph {
          transform: scale(1.08);
        }
        .nav-menu-btn__plus {
          transition-duration: 0.2s;
        }
      }

      /* Bottom-left: one shell (button + strip); hold opens strip, grows from the left edge */
      .audio-dock {
        /* Strip expand/collapse: one property (grid track) — avoids max-width + flex-basis + height fighting. */
        --ad-spring: cubic-bezier(0.2, 0.85, 0.22, 1);
        --ad-grid-ease: cubic-bezier(0.32, 0.06, 0.18, 1);
        --ad-grid-dur: 0.52s;
        --ad-ink: #1a1812;
        --ad-liquid-w: 11.75rem;
        --ad-liquid-fill: color-mix(in srgb, #faf6f0 94%, #e8e2da);
        --ad-liquid-fill-hover: color-mix(in srgb, #faf6f0 88%, #e8e2da);
        position: fixed;
        z-index: 19;
        left: max(1.05rem, env(safe-area-inset-left, 0px));
        bottom: max(1.15rem, env(safe-area-inset-bottom, 0px));
        display: block;
        pointer-events: none;
        font-family: 'IBM Plex Mono', 'JetBrains Mono', monospace;
      }

      .audio-dock__shell {
        display: inline-flex;
        align-items: center;
        max-width: min(100vw - 1.2rem, 22rem);
        border-radius: 999px;
        border: 1px solid #e2e0dc;
        background: #faf8f5;
        box-shadow: none;
        pointer-events: auto;
        box-sizing: border-box;
        min-height: 40px;
      }

      .audio-dock__cluster {
        display: grid;
        align-items: stretch;
        /* Length–length interpolation avoids `fr` glitches (brief width pop) on close. */
        grid-template-columns: auto 0rem;
        justify-content: start;
        min-width: 0;
        width: max-content;
        max-width: min(22rem, calc(100vw - 1.2rem));
        pointer-events: auto;
        filter: none;
        contain: layout;
        transition: grid-template-columns var(--ad-grid-dur) var(--ad-grid-ease);
      }

      .audio-dock--liquid .audio-dock__cluster {
        grid-template-columns: auto var(--ad-liquid-w);
      }

      .audio-dock__eq-btn {
        position: relative;
        z-index: 2;
        width: 40px;
        height: 40px;
        min-width: 40px;
        min-height: 40px;
        border-radius: 50%;
        border: 1px solid #e2e8f0;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        /* White disc like default hamburger; motion glyph is black inside (see .audio-dock__signal) */
        background: #fff;
        color: #1a1814;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        box-shadow: none;
        perspective: 100px;
        transform-style: preserve-3d;
        transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
        touch-action: manipulation;
        user-select: none;
      }

      .audio-dock__eq-btn:hover {
        background: #faf9f7;
        color: #0c0a08;
        border-color: #d4d0ca;
      }

      .audio-dock__eq-btn:focus-visible {
        background: #faf9f7;
        color: #0c0a08;
        border-color: #d4d0ca;
        outline: 2px solid rgba(26, 24, 20, 0.22);
        outline-offset: 2px;
      }

      .audio-dock__visual {
        display: block;
        pointer-events: none;
        transform-style: preserve-3d;
      }

      /* Audio glyph: centered EQ only — calm equal bars when paused, spectrum when playing. */
      .audio-dock__signal {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        margin: 0 auto;
        pointer-events: none;
        color: #0a0a0a;
        isolation: isolate;
      }

      :root {
        --audio-wave-morph: 0;
      }

      .audio-dock__eq-svg {
        display: block;
        width: 100%;
        height: 100%;
        overflow: visible;
        shape-rendering: auto;
        transform-origin: 50% 50%;
      }

      .audio-dock__eq-bar {
        stroke: none;
        fill: currentColor;
        opacity: calc(0.76 + 0.24 * var(--audio-wave-morph, 0));
      }

      body.journey-flower-active .audio-dock__signal {
        color: color-mix(in srgb, #0a0a0a 72%, var(--journey-rail) 28%);
      }

      @media (prefers-reduced-motion: reduce) {
        .audio-dock__eq-bar {
          opacity: 0.82;
        }

        .audio-dock .nav-player-wrap::before {
          transition: none;
        }

        .audio-dock--liquid .nav-player-wrap::before {
          transform: scaleX(1);
          opacity: 1;
        }

        .audio-dock--liquid .nav-mini-info {
          animation: none;
          animation-delay: 0s;
          opacity: 1;
          -webkit-clip-path: none;
          clip-path: none;
        }
      }

      .audio-dock .nav-player-wrap {
        --nav-player-pad-x: 0.22rem;
        position: relative;
        z-index: 1;
        min-width: 0;
        width: 100%;
        max-width: min(16rem, calc(100vw - 4.5rem));
        box-sizing: border-box;

      /*

        inset: 0;
        z-index: 18;

        transform: translateZ(0);
        backface-visibility: hidden;
        transition:
          opacity var(--sd-draw) var(--sd-spring-draw),
          -webkit-backdrop-filter var(--sd-draw) var(--sd-spring-draw),
          backdrop-filter var(--sd-draw) var(--sd-spring-draw);

        position: relative;

      .site-drawer__row::after {

      /* Email / phone (left) and socials (right): full width, bottom-aligned, space-between. */

      .site-drawer__contact a::before {
