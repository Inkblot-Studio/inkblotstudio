<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inkblot Studio | Cinematic Visual Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --dominant: #2563EB;
        --support: #60A5FA;
        --primary: #2563EB;
        --primary-hover: #60A5FA;
        --accent: #10B981;
        --background: #020617;
        --surface: #0B1220;
        --text-primary: #F8FAFC;
        --text-muted: #CBD5E1;
        --border: #1E293B;
      }

      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: var(--background);
        color: var(--text-primary);
        font-family: 'Montserrat', sans-serif;
        overflow-x: hidden;
        overflow-y: auto;
      }

      /* 3D Canvas fixed in background */
      #canvas-container {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      /* 3D HUD Canvas for Audio Button */
      #hud-container {
        position: fixed;
        inset: 0;
        z-index: 6;
        pointer-events: none;
      }

      /* Capture mouse for the 3D scene globally */
      #interaction-layer {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: auto;
      }

      /* Citron Bloom engine HUD (React + Citron UI) */
      #citron-bloom-hud {
        position: fixed;
        inset: 0;
        z-index: 25;
        pointer-events: none;
      }

      #citron-bloom-hud > * {
        pointer-events: auto;
      }

      /* UI Overlay on top */
      #ui-layer {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 2rem;
      }

      /* Navbar */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        pointer-events: auto;
      }

      .logo-container {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .logo-container img {
        height: 32px;
        width: auto;
      }

      .logo-text {
        display: flex;
        align-items: baseline;
        gap: 0.3rem;
      }

      .logo-text .inkblot {
        font-family: 'Cinzel', serif;
        font-weight: 600;
        letter-spacing: 0.05em;
        font-size: 1.4rem;
        text-transform: uppercase;
      }

      .logo-text .studio {
        font-family: 'Montserrat', sans-serif;
        font-weight: 300;
        letter-spacing: 0.1em;
        font-size: 1.0rem;
        text-transform: uppercase;
        opacity: 0.8;
      }

      .logo-text .tm {
        font-family: 'Montserrat', sans-serif;
        font-size: 0.6rem;
        opacity: 0.5;
        transform: translateY(-0.5rem);
      }

      /* Desktop Nav */
      nav {
        display: flex;
        gap: 2.5rem;
      }

      nav a {
        color: var(--text-primary);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 400;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        opacity: 0.6;
        transition: opacity 0.3s ease, color 0.3s ease;
      }

      nav a:hover {
        opacity: 1;
        color: var(--support);
      }

      /* Mobile Nav Toggle */
      .menu-toggle {
        display: none;
        flex-direction: column;
        gap: 4px;
        background: none;
        border: none;
        cursor: pointer;
        z-index: 20;
      }

      .menu-toggle span {
        width: 24px;
        height: 2px;
        background-color: var(--text-primary);
        transition: 0.3s;
      }

      /* Virtual scroll */
      #virtual-scroll-space {
        position: absolute;
        top: 0;
        left: 0;
        width: 1px;
        height: 500vh;
        pointer-events: none;
        z-index: 0;
      }

      @media (max-width: 768px) {
        #ui-layer { padding: 1.5rem; }
        nav { display: none; }
        .menu-toggle { display: flex; }
      }
    </style>
  </head>
  <body>
    <!-- Virtual scroll element to provide native scrollbars while visual is fixed -->
    <div id="virtual-scroll-space"></div>

    <div id="canvas-container"></div>
    <div id="hud-container"></div>
    <div id="interaction-layer"></div>
    
    <div id="citron-bloom-hud"></div>

    <div id="ui-layer">
      <header>
        <div class="logo-container">
          <img src="/inkblotstudio_logo.svg" alt="Inkblot Studio Logo">
          <div class="logo-text">
            <span class="inkblot">Inkblot</span>
            <span class="studio">Studio</span>
            <span class="tm">™</span>
          </div>
        </div>
        
        <nav>
          <a href="#">Showcase</a>
          <a href="#">Products</a>
          <a href="#">Contact</a>
        </nav>

        <button class="menu-toggle" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </header>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
