<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Inkblot Studio — scroll-driven 3D, glass flora, and production engineering for serious products."
    />
    <title>Inkblot Studio | Cinematic visual experience</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300..600;9..144,1,300..600&family=IBM+Plex+Mono:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --scroll-raw: 0;
        --journey-section: 0;
        --journey-local: 0;
        --journey-work-ui: 0;
        --journey-edge: 0;
        --journey-rail: #7dd3fc;
        --at-neon-flicker: 1;
        --at-neon-pulse: 0.45;
        --dominant: #2563EB;
        --support: #60A5FA;
        --primary: #2563EB;
        --primary-hover: #60A5FA;
        --accent: #10B981;
        --background: #020617;
        --surface: #0B1220;
        --text-primary: #F8FAFC;
        --text-muted: #CBD5E1;
        --border: #1E293B;
      }

      /* React splash mounts into #splash-root (see src/ui/loading/LoadingScreen.tsx) */
      #splash-root {
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: auto;
      }

      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* min-height (not height:100%) so in-flow #virtual-scroll-space can grow document scroll range */
      html {
        width: 100%;
        min-height: 100%;
      }

      body {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        background: var(--background);
        color: var(--text-primary);
        font-family: 'Outfit', system-ui, sans-serif;
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      /* Vertical pill thumb on the viewport edge (replaces native bar). */
      .custom-scroll-rail {
        position: fixed;
        top: 0;
        right: 0;
        width: 12px;
        height: 100dvh;
        max-height: 100vh;
        z-index: 14;
        pointer-events: none;
        padding: max(12px, env(safe-area-inset-top))
          max(5px, env(safe-area-inset-right))
          max(12px, env(safe-area-inset-bottom))
          0;
        box-sizing: border-box;
      }

      .custom-scroll-track {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .custom-scroll-edge {
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 1px;
        margin-left: -0.5px;
        background: rgba(0, 0, 0, 0.88);
        pointer-events: none;
      }

      .custom-scroll-thumb {
        position: absolute;
        left: 50%;
        top: 0;
        width: 8px;
        margin-left: -4px;
        border-radius: 999px;
        background: color-mix(in srgb, #e8eaef 92%, #94a3b8);
        min-height: 20px;
        transform: translateY(0);
        will-change: transform, height;
        opacity: 0;
        transition: opacity 0.25s ease;
      }

      /* 3D Canvas fixed in background */
      #canvas-container {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      #app-root {
        display: contents;
      }

      /* 3D HUD Canvas for Audio Button */
      #hud-container {
        position: fixed;
        inset: 0;
        z-index: 6;
        pointer-events: none;
      }

      /* Capture mouse for the 3D scene globally */
      #interaction-layer {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: auto;
      }

      /* UI Overlay on top */
      #ui-layer {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding: max(2.9rem, calc(env(safe-area-inset-top) + 0.7rem))
          max(80px, env(safe-area-inset-right))
          1.5rem
          max(80px, env(safe-area-inset-left));
      }

      .top-chrome {
        display: flex;
        flex-wrap: nowrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        width: 100%;
        pointer-events: none;
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-decoration: none;
        color: inherit;
        pointer-events: auto;
        padding: 0.14rem 0;
        margin: 0;
        align-self: flex-start;
      }

      .brand-row img {
        height: 28px;
        width: auto;
        opacity: 0.92;
      }

      .brand-row .logo-text {
        display: flex;
        align-items: baseline;
        gap: 0.25rem;
      }

      .brand-row .inkblot {
        font-family: 'Outfit', system-ui, sans-serif;
        font-weight: 600;
        letter-spacing: 0.05em;
        font-size: 1.15rem;
        text-transform: uppercase;
      }

      .brand-row .studio {
        font-family: 'Fraunces', Georgia, serif;
        font-style: normal;
        font-weight: 300;
        letter-spacing: 0.1em;
        font-size: 0.82rem;
        text-transform: uppercase;
        opacity: 0.78;
      }

      .brand-row .tm {
        font-size: 0.55rem;
        opacity: 0.45;
        transform: translateY(-0.35rem);
      }

      .nav-stack-top-right {
        --nav-island-w: min(78vw, 218px);
        --nav-island-min-h: 2.95rem;
        --nav-player-w: calc(var(--nav-island-w) * 0.528);
        /* Glass kit + accent (showcase default; flower journey overrides below) */
        --nav-accent: #38bdf8;
        --nav-accent-2: #a78bfa;
        --nav-ink: #f1f5f9;
        --nav-ink-dim: color-mix(in srgb, #cbd5e1 78%, var(--nav-accent));
        --nav-glass-fill: rgba(2, 8, 18, 0.34);
        --nav-glass-deep: rgba(2, 6, 14, 0.88);
        --nav-chrome-glow: 0.48;
        flex: 0 0 auto;
        margin-left: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        pointer-events: none;
        position: relative;
        overflow: visible;
        transform-origin: 100% 0%;
        transform-style: preserve-3d;
        will-change: transform;
        transform: perspective(1400px)
          rotateX(calc(var(--nav-warp, 0) * -5.5deg * var(--nav-dir, 1)))
          translateY(calc(var(--nav-warp, 0) * -2.5px * var(--nav-dir, 1)))
          skewX(calc(var(--nav-warp, 0) * 11deg * var(--nav-dir, 1)))
          scaleX(calc(1 + var(--nav-warp, 0) * 0.024));
        transition: transform 0.1s ease-out;
      }

      body.journey-flower-active .nav-stack-top-right {
        --nav-accent: var(--journey-rail, #7dd3fc);
        --nav-accent-2: color-mix(in srgb, var(--journey-rail, #7dd3fc) 50%, #e9d5ff);
        --nav-chrome-glow: 0.62;
      }

      .nav-stack-top-right > * {
        pointer-events: auto;
      }

      .nav-stack-top-right::before {
        display: none;
      }

      .nav-pill-morph {
        position: relative;
        z-index: 3;
        width: var(--nav-island-w);
        min-width: var(--nav-island-w);
        max-width: var(--nav-island-w);
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        min-height: var(--nav-island-min-h);
        padding: 0.58rem 0.72rem 0.54rem;
        border-radius: 999px;
        /* Single edge: half-opacity of page `--border` (2× more transparent than solid UI border) */
        border: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
        background: var(--nav-glass-fill);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.45);
        -webkit-backdrop-filter: blur(18px) saturate(1.12);
        backdrop-filter: blur(18px) saturate(1.12);
        overflow: visible;
      }

      .nav-pill-at {
        position: relative;
        z-index: 1;
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.12rem 0.32rem;
        padding: 0.16rem 0.22rem 0.2rem;
        margin: 0;
        border: none;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }

      .nav-pill-link {
        font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
        font-size: clamp(0.58rem, 1.5vw, 0.68rem);
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--nav-ink-dim);
        text-decoration: none;
        white-space: nowrap;
        padding: 0.22rem 0.16rem;
        border-radius: 999px;
      }

      #nav-audio-toggle.nav-flow-hit {
        --nav-petal-pulse: 0.26;
      }

      .nav-flow-hit {
        flex: 0 0 auto;
        width: 31px;
        max-width: 31px;
        min-width: 31px;
        height: 31px;
        margin: 0;
        border: none;
        padding: 0;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        pointer-events: auto;
        -webkit-tap-highlight-color: transparent;
      }

      .nav-flow-hit:focus-visible {
        outline: 1px solid color-mix(in srgb, var(--nav-accent) 75%, #fff);
        outline-offset: 2px;
      }

      .nav-flow-wrap {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      .nav-flow-svg {
        width: 100%;
        height: 100%;
        max-width: 31px;
        max-height: 31px;
        overflow: visible;
      }

      .nav-deck-petals {
        vector-effect: non-scaling-stroke;
        transition: opacity 0.05s linear, filter 0.05s linear;
      }

      body:not(.music-playing) .nav-deck-petals {
        opacity: 0.78;
        filter: none;
      }

      /* Beat / level pulse lives in petal fills (brightness + saturation), not outer rings */
      body.music-playing .nav-deck-petals {
        opacity: calc(0.62 + var(--nav-petal-pulse, 0.28) * 0.36);
        filter: brightness(calc(0.78 + var(--nav-petal-pulse, 0.28) * 0.52))
          saturate(calc(0.88 + var(--nav-petal-pulse, 0.28) * 0.42));
      }

      .nav-floral-heart {
        vector-effect: non-scaling-stroke;
      }

      body.music-playing .nav-floral-heart {
        opacity: calc(0.82 + var(--nav-petal-pulse, 0.28) * 0.18);
        filter: brightness(calc(0.9 + var(--nav-petal-pulse, 0.28) * 0.35))
          saturate(calc(0.92 + var(--nav-petal-pulse, 0.28) * 0.28));
      }

      .nav-player-wrap {
        --nav-player-pad-x: 0.2rem;
        position: relative;
        z-index: 2;
        align-self: center;
        display: flex;
        align-items: stretch;
        justify-content: center;
        width: var(--nav-player-w);
        min-width: var(--nav-player-w);
        max-width: var(--nav-player-w);
        box-sizing: border-box;
        margin-top: 0;
        min-height: 0;
        max-height: 0;
        padding: 0 var(--nav-player-pad-x);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        overflow: hidden;
        border-radius: 8px;
        border: 1px solid transparent;
        background: rgba(15, 23, 42, 0.35);
        transform: translateY(-8px);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        transition:
          opacity 0.32s ease,
          transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
          visibility 0s linear 0.45s,
          max-height 0.45s cubic-bezier(0.22, 1, 0.36, 1),
          min-height 0.45s cubic-bezier(0.22, 1, 0.36, 1),
          margin-top 0.45s cubic-bezier(0.22, 1, 0.36, 1),
          padding-block 0.45s ease,
          border-color 0.35s ease,
          box-shadow 0.45s ease,
          background 0.45s ease,
          border-radius 0.35s ease;
        box-shadow: none;
      }

      body.music-playing .nav-player-wrap::before {
        display: none;
      }

      body.music-playing .nav-player-wrap {
        margin-top: clamp(0.8rem, 2.6vw, 1.2rem);
        min-height: 2.5rem;
        max-height: 5rem;
        padding: 0.2rem 0.18rem;
        opacity: 0.5;
        visibility: visible;
        pointer-events: auto;
        overflow: visible;
        transition-delay: 0s;
        border-radius: 8px;
        border-color: rgba(148, 163, 184, 0.18);
        background: rgba(15, 23, 42, 0.4);
        transform: translateY(0);
        box-shadow: none;
      }

      body.music-playing .nav-player-wrap:hover,
      body.music-playing .nav-player-wrap:focus-within {
        opacity: 0.72;
        border-color: rgba(148, 163, 184, 0.28);
      }

      .nav-mini-player {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        align-self: stretch;
        flex: 1;
        gap: 0.12rem;
        padding: 0 0.02rem;
        border: none;
        border-radius: 0;
        outline: none;
        background: transparent;
        opacity: 1;
        min-width: 0;
        width: 100%;
        max-width: 100%;
        min-height: 0;
        box-sizing: border-box;
        flex-shrink: 0;
      }

      .nav-mini-btn {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.52rem;
        font-weight: 500;
        width: 1.28rem;
        height: 1.35rem;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        border: none;
        border-radius: 4px;
        background: transparent;
        color: rgba(203, 213, 225, 0.85);
        cursor: pointer;
        line-height: 1;
        padding: 0;
        transition: color 0.15s ease, background 0.15s ease;
      }

      .nav-mini-btn:hover {
        color: #f1f5f9;
        background: rgba(255, 255, 255, 0.06);
      }

      .nav-mini-info {
        flex: 1;
        min-width: 0;
        align-self: stretch;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 0.1rem;
      }

      .nav-mini-mq.nav-mini-mq--title {
        flex: 1;
        min-width: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
      }

      .nav-mini-mq {
        min-height: 0;
      }

      .nav-mini-mq-active .nav-mini-mq-view {
        justify-content: flex-start;
        align-items: center;
        mask-image: linear-gradient(
          90deg,
          transparent 0%,
          #000 5%,
          #000 95%,
          transparent 100%
        );
        -webkit-mask-image: linear-gradient(
          90deg,
          transparent 0%,
          #000 5%,
          #000 95%,
          transparent 100%
        );
      }

      .nav-mini-mq-view {
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        width: 100%;
        min-height: 0;
        flex: 1;
        mask-image: none;
        -webkit-mask-image: none;
      }

      .nav-mini-mq:not(.nav-mini-mq-active) .nav-mini-mq-view {
        justify-content: center;
        align-items: center;
      }

      .nav-mini-mq-track {
        display: inline-flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        white-space: nowrap;
        width: max-content;
        max-height: 100%;
        will-change: transform;
      }

      .nav-mini-mq-active .nav-mini-mq-track {
        animation: navMiniMarquee var(--mq-dur, 14s) linear infinite;
      }

      @media (prefers-reduced-motion: reduce) {
        .nav-mini-mq-active .nav-mini-mq-track {
          animation: none;
          transform: none;
        }
      }

      @keyframes navMiniMarquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }

      .nav-mini-mq-seg {
        flex-shrink: 0;
        display: inline-flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        padding-right: 2rem;
        font-family: 'IBM Plex Mono', monospace;
        font-size: clamp(0.52rem, 1.5vw, 0.65rem);
        font-weight: 400;
        letter-spacing: 0.06em;
        line-height: 1.35;
        text-transform: uppercase;
        color: rgba(226, 232, 240, 0.88);
      }

      /* Virtual scroll */
      /* In-flow spacer so scrollHeight reflects the full journey (absolute children often don't). */
      #virtual-scroll-space {
        display: block;
        width: 1px;
        height: 520vh;
        pointer-events: none;
      }

      @media (max-width: 768px) {
        #virtual-scroll-space {
          height: 600vh;
        }
      }

      body.journey-flower-active[data-journey-section='0'] {
        --journey-rail: #7dd3fc;
      }
      body.journey-flower-active[data-journey-section='1'] {
        --journey-rail: #a5b4fc;
      }

      body.journey-boundary-flash::after {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 8;
        pointer-events: none;
        background: radial-gradient(
          ellipse 58% 52% at 50% 42%,
          rgba(248, 250, 252, 0.07) 0%,
          rgba(2, 6, 23, 0.72) 72%
        );
        animation: journey-boundary-flash 0.5s cubic-bezier(0.42, 0, 0.58, 1) forwards;
      }

      @keyframes journey-boundary-flash {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body.journey-boundary-flash::after {
          animation-duration: 0.2s;
        }
      }

      .journey-scene-frame {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
      }

      body:not(.journey-flower-active) .journey-scene-frame {
        display: none;
      }

      .journey-scene-frame__vignette {
        position: absolute;
        inset: 0;
        box-shadow:
          inset 0 0 min(100px, 18vw) rgba(0, 0, 0, 0.5),
          inset 0 0 min(220px, 38vw) rgba(0, 0, 0, 0.35);
        opacity: calc(0.28 + var(--journey-edge, 0) * 0.52);
        transition: opacity 0.15s ease-out;
      }

      .journey-scene-frame__rail {
        position: absolute;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          color-mix(in srgb, var(--journey-rail) 75%, transparent) 22%,
          color-mix(in srgb, var(--journey-rail) 90%, #fff) 50%,
          color-mix(in srgb, var(--journey-rail) 75%, transparent) 78%,
          transparent 100%
        );
        opacity: calc((0.38 + var(--journey-edge, 0) * 0.55) * var(--at-neon-flicker, 1));
        box-shadow:
          0 0 calc(10px * var(--at-neon-flicker, 1))
            color-mix(in srgb, var(--journey-rail) calc(55% * var(--at-neon-pulse, 0.45)), transparent);
        transition: opacity 0.15s ease-out;
      }

      .journey-scene-frame__rail--top {
        top: 0;
      }

      .journey-scene-frame__rail--bottom {
        bottom: 0;
      }

      /* Six-band journey DOM (flower experience): WebGL canvas stays z-index 1. */
      #journey-dom {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
      }

      #journey-dom .journey-panel {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(1.1rem, 4vw, 3rem);
        box-sizing: border-box;
        opacity: 0;
        transition: opacity 0.5s ease;
        pointer-events: none;
      }

      #journey-work.journey-panel {
        align-items: center;
        justify-content: center;
        padding: clamp(3rem, 8vh, 4rem) clamp(1.1rem, 4vw, 2rem);
        opacity: var(--journey-work-ui, 0);
        pointer-events: none;
      }

      body[data-journey-section='1'] #journey-work.journey-panel {
        pointer-events: auto;
      }

      .journey-work__inner {
        width: min(32rem, 100%);
        margin: 0 auto;
      }

      .journey-work__kicker {
        font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace;
        font-size: 0.62rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: color-mix(in srgb, #94a3b8 90%, #a5b4fc);
        margin: 0 0 0.5rem;
      }

      .journey-work__head {
        margin-bottom: 1.5rem;
      }

      .journey-work__title {
        font-family: 'Outfit', system-ui, sans-serif;
        font-weight: 600;
        font-size: clamp(1.2rem, 2.6vw, 1.5rem);
        line-height: 1.2;
        letter-spacing: 0.02em;
        color: var(--text-primary);
        margin: 0 0 0.5rem;
      }

      .journey-work__lede {
        font-family: 'Outfit', sans-serif;
        font-size: clamp(0.84rem, 1.2vw, 0.95rem);
        line-height: 1.5;
        color: color-mix(in srgb, var(--text-muted) 95%, #f1f5f9);
        margin: 0 0 0.4rem;
      }

      .journey-work__tagline {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.68rem;
        letter-spacing: 0.04em;
        color: color-mix(in srgb, #7dd3fc 55%, var(--text-muted));
        margin: 0;
      }

      .journey-work__list {
        list-style: none;
        margin: 0;
        padding: 0;
        border-top: 1px solid color-mix(in srgb, #334155 70%, transparent);
      }

      .journey-work__row {
        display: grid;
        grid-template-columns: 1fr 1.4fr;
        gap: 0.5rem 1rem;
        padding: 0.7rem 0;
        border-bottom: 1px solid color-mix(in srgb, #1e293b 90%, transparent);
        align-items: baseline;
        font-size: 0.8rem;
      }

      @media (max-width: 520px) {
        .journey-work__row {
          grid-template-columns: 1fr;
        }
      }

      .journey-work__name {
        font-family: 'Outfit', sans-serif;
        font-weight: 500;
        color: var(--text-primary);
      }

      .journey-work__context {
        font-family: 'Outfit', sans-serif;
        color: var(--text-muted);
        line-height: 1.4;
      }

      @media (prefers-reduced-motion: reduce) {
        #journey-dom .journey-panel {
          transition: opacity 0.2s ease;
        }
      }

      @media (max-width: 768px) {
        #ui-layer {
          padding: max(2.7rem, calc(env(safe-area-inset-top) + 0.6rem))
            max(80px, env(safe-area-inset-right))
            1rem
            max(80px, env(safe-area-inset-left));
        }
        .top-chrome {
          flex-wrap: wrap;
        }
        .nav-stack-top-right {
          width: 100%;
          align-items: center;
          --nav-island-min-h: 2.72rem;
        }
        .nav-pill-morph {
          --nav-island-w: min(72vw, 202px);
          width: var(--nav-island-w);
          min-width: var(--nav-island-w);
          max-width: var(--nav-island-w);
          padding: 0.5rem 0.58rem 0.46rem;
          border-radius: 999px;
        }
        .nav-pill-at {
          padding: 0.12rem 0.16rem 0.16rem;
          gap: 0.08rem 0.24rem;
        }
        .nav-player-wrap {
          --nav-player-pad-x: 0.14rem;
        }
        body.music-playing .nav-player-wrap {
          padding: 0.18rem 0.14rem;
        }
        .nav-mini-btn {
          width: 1.2rem;
          height: 1.28rem;
          font-size: 0.48rem;
        }
        .nav-pill-link {
          font-size: clamp(0.5rem, 3.1vw, 0.58rem);
          letter-spacing: 0.1em;
          padding: 0.18rem 0.12rem;
        }
        .nav-flow-hit {
          width: 29px;
          max-width: 29px;
          min-width: 29px;
          height: 29px;
        }
        .nav-flow-svg {
          max-width: 29px;
          max-height: 29px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .nav-stack-top-right {
          transform: none;
        }
        .nav-player-wrap {
          transition-duration: 0.01ms !important;
        }
        body.music-playing .nav-player-wrap {
          transition-duration: 0.01ms !important;
        }
      }

      body:not(.citron-bloom-mode) .scroll-hint,
      body.experience-stomp .scroll-hint {
        display: none;
      }

      .scroll-hint {
        position: fixed;
        left: 50%;
        bottom: max(2.6rem, 10vh);
        transform: translateX(-50%);
        z-index: 9;
        pointer-events: none;
        margin: 0;
        padding: 0;
        font-family: 'Syne', 'Outfit', system-ui, sans-serif;
        font-size: clamp(0.62rem, 1.05vw, 0.82rem);
        font-weight: 500;
        font-style: normal;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        text-align: center;
        white-space: nowrap;
        color: color-mix(in srgb, #e0f2fe 90%, #a5f3fc 10%);
        text-shadow:
          0 0 24px color-mix(in srgb, #22d3ee 28%, transparent),
          0 0 1px color-mix(in srgb, #020617 55%, transparent);
        opacity: clamp(0, calc((1 - var(--scroll-raw, 0) * 22) * 0.7), 1);
        transition: opacity 0.55s ease;
      }

      #cookie-consent {
        position: fixed;
        left: 50%;
        bottom: max(1rem, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 60;
        width: min(calc(100vw - 2rem), 36rem);
        padding: 0 0.75rem;
        pointer-events: none;
      }

      #cookie-consent:not([hidden]) {
        pointer-events: auto;
      }

      .cookie-consent__inner {
        pointer-events: auto;
        padding: 1.15rem 1.25rem 1.05rem;
        border-radius: 14px;
        border: 1px solid color-mix(in srgb, var(--text-muted) 28%, transparent);
        background: color-mix(in srgb, var(--background) 82%, #0f172a);
        box-shadow: 0 18px 48px color-mix(in srgb, #000 55%, transparent);
      }

      .cookie-consent__text {
        font-family: 'Outfit', system-ui, sans-serif;
        font-size: clamp(0.65rem, 1.35vw, 0.74rem);
        font-weight: 400;
        line-height: 1.55;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-primary);
        margin-bottom: 1rem;
      }

      .cookie-consent__text a {
        color: inherit;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .cookie-consent__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        margin-bottom: 0.85rem;
      }

      .cookie-consent__btn {
        font-family: 'Outfit', system-ui, sans-serif;
        font-size: 0.62rem;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 0.62rem 1.15rem;
        border-radius: 999px;
        cursor: pointer;
        border: 1px solid color-mix(in srgb, var(--text-muted) 45%, transparent);
        transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
      }

      .cookie-consent__btn--primary {
        background: color-mix(in srgb, #1e3a5f 88%, #0f172a);
        color: var(--text-primary);
      }

      .cookie-consent__btn--primary:hover {
        background: color-mix(in srgb, #2563eb 35%, #1e293b);
        border-color: color-mix(in srgb, var(--text-muted) 65%, transparent);
      }

      .cookie-consent__btn--ghost {
        background: transparent;
        color: var(--text-primary);
      }

      .cookie-consent__btn--ghost:hover {
        background: color-mix(in srgb, var(--text-primary) 6%, transparent);
      }

      .cookie-consent__links {
        font-family: 'Outfit', system-ui, sans-serif;
        font-size: 0.58rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem 0.65rem;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
      }

      .cookie-consent__links a {
        color: color-mix(in srgb, var(--text-primary) 88%, var(--text-muted));
        text-decoration: underline;
        text-underline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <div id="splash-root"></div>

    <!-- Virtual scroll element to provide native scrollbars while visual is fixed -->
    <div id="virtual-scroll-space"></div>

    <div id="canvas-container"></div>
    <div id="app-root"></div>

    <div class="journey-scene-frame" id="journey-scene-frame" aria-hidden="true">
      <div class="journey-scene-frame__vignette"></div>
      <div class="journey-scene-frame__rail journey-scene-frame__rail--top"></div>
      <div class="journey-scene-frame__rail journey-scene-frame__rail--bottom"></div>
    </div>
    <div id="hud-container"></div>
    <div id="interaction-layer"></div>

    <div id="journey-dom" aria-hidden="true">
      <section id="journey-work" class="journey-panel journey-work" aria-label="Work and portfolio">
        <div id="journey-work-root"></div>
      </section>
    </div>

    <p class="scroll-hint" aria-hidden="true">Scroll down</p>

    <div
      id="cookie-consent"
      hidden
      role="dialog"
      aria-labelledby="cookie-consent-title"
      aria-modal="true"
    >
      <div class="cookie-consent__inner">
        <p id="cookie-consent-title" class="cookie-consent__text">
          Our site uses essential cookies and, with your consent, analytics cookies.
          Details in our <a href="#">privacy notice</a>.
        </p>
        <div class="cookie-consent__actions">
          <button type="button" class="cookie-consent__btn cookie-consent__btn--primary" id="cookie-accept">
            Accept cookies
          </button>
          <button type="button" class="cookie-consent__btn cookie-consent__btn--ghost" id="cookie-reject">
            Reject cookies
          </button>
        </div>
        <p class="cookie-consent__links">
          <a href="#">Terms &amp; conditions</a>
          <span aria-hidden="true">·</span>
          <a href="#">Cookie policy</a>
          <span aria-hidden="true">·</span>
          <a href="#">Privacy policy</a>
        </p>
      </div>
    </div>

    <div class="custom-scroll-rail" id="custom-scroll-rail" aria-hidden="true">
      <div class="custom-scroll-track" id="custom-scroll-track">
        <div class="custom-scroll-edge"></div>
        <div class="custom-scroll-thumb" id="custom-scroll-thumb"></div>
      </div>
    </div>

    <div id="ui-layer">
      <div class="top-chrome">
        <a class="brand-row" href="#" aria-label="Inkblot Studio home">
          <img src="/inkblotstudio_logo.svg" alt="">
          <div class="logo-text">
            <span class="inkblot">Inkblot</span>
            <span class="studio">Studio</span>
            <span class="tm">™</span>
          </div>
        </a>

        <div class="nav-stack-top-right">
          <div class="nav-pill-morph">
            <header class="nav-pill-at">
              <a class="nav-pill-link" href="#">Work</a>
              <button
                type="button"
                class="nav-flow-hit"
                id="nav-audio-toggle"
                aria-label="Play or pause soundtrack"
                aria-pressed="false"
                title="Floral control: gentle spin and glow while music plays."
              >
                <span class="nav-flow-wrap">
                  <svg class="nav-flow-svg" viewBox="0 0 56 56" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                    <defs>
                      <radialGradient id="nav-floral-core" cx="38%" cy="36%" r="68%">
                        <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.42"/>
                        <stop offset="55%" stop-color="var(--nav-accent)" stop-opacity="0.28"/>
                        <stop offset="100%" stop-color="var(--nav-accent-2)" stop-opacity="0.14"/>
                      </radialGradient>
                      <linearGradient id="nav-deck-petal" x1="22%" y1="0%" x2="78%" y2="100%">
                        <stop offset="0%" stop-color="var(--nav-accent)" stop-opacity="0.88"/>
                        <stop offset="50%" stop-color="#f8fafc" stop-opacity="0.48"/>
                        <stop offset="100%" stop-color="var(--nav-accent-2)" stop-opacity="0.46"/>
                      </linearGradient>
                    </defs>
                    <g id="nav-deck-rot" transform="rotate(0 28 28)">
                      <g class="nav-deck-petals" fill="url(#nav-deck-petal)" stroke="rgba(255, 255, 255, 0.09)" stroke-width="0.2">
                        <ellipse cx="28" cy="11.6" rx="5.1" ry="10.8" transform="rotate(0 28 28)" />
                        <ellipse cx="28" cy="11.6" rx="5.1" ry="10.8" transform="rotate(60 28 28)" />
                        <ellipse cx="28" cy="11.6" rx="5.1" ry="10.8" transform="rotate(120 28 28)" />
                        <ellipse cx="28" cy="11.6" rx="5.1" ry="10.8" transform="rotate(180 28 28)" />
                        <ellipse cx="28" cy="11.6" rx="5.1" ry="10.8" transform="rotate(240 28 28)" />
                        <ellipse cx="28" cy="11.6" rx="5.1" ry="10.8" transform="rotate(300 28 28)" />
                      </g>
                      <circle class="nav-floral-heart" cx="28" cy="28" r="5.8" fill="url(#nav-floral-core)" opacity="0.9" />
                      <circle cx="28" cy="28" r="1.65" fill="var(--nav-accent-2)" opacity="0.38" />
                    </g>
                  </svg>
                </span>
              </button>
              <a class="nav-pill-link" href="#">Contact</a>
            </header>
          </div>
          <div class="nav-player-wrap" id="nav-player-wrap" aria-hidden="true">
            <div class="nav-mini-player" id="nav-mini" aria-label="Track controls">
              <button type="button" class="nav-mini-btn" id="nav-mini-prev" aria-label="Previous track">⟨⟨</button>
              <div class="nav-mini-info" id="nav-mini-info">
                <div class="nav-mini-mq nav-mini-mq--title" id="nav-mini-wrap-title">
                  <div class="nav-mini-mq-view" id="nav-mini-title-view">
                    <div class="nav-mini-mq-track" id="nav-mini-title-track"></div>
                  </div>
                </div>
              </div>
              <button type="button" class="nav-mini-btn" id="nav-mini-next" aria-label="Next track">⟩⟩</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
