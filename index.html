<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inkblot Studio | Cinematic Visual Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #2563EB;
        --primary-hover: #60A5FA;
        --accent: #10B981;
        --background: #020617;
        --surface: rgba(11, 18, 32, 0.4);
        --text-primary: #F8FAFC;
        --text-muted: #CBD5E1;
        --border: rgba(255, 255, 255, 0.05);
      }

      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: var(--background);
        color: var(--text-primary);
        font-family: 'Montserrat', sans-serif;
        overflow-x: hidden;
        overflow-y: auto;
      }

      /* 3D Canvas fixed in background */
      #canvas-container {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none; /* Let pointer events pass through to interaction layer if needed, or catch them here */
      }

      /* Capture mouse for the 3D scene globally */
      #interaction-layer {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: auto;
      }

      /* UI Overlay on top */
      #ui-layer {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none; /* Only specific elements should be clickable */
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 2rem;
      }

      /* Navbar */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        pointer-events: auto;
      }

      .logo-container {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .logo-container img {
        height: 32px;
        width: auto;
      }

      .logo-container span {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        letter-spacing: 0.05em;
        font-size: 1.4rem;
        text-transform: uppercase;
      }

      nav {
        display: flex;
        gap: 2rem;
      }

      nav a {
        color: var(--text-primary);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        opacity: 0.7;
        transition: opacity 0.3s ease, color 0.3s ease;
      }

      nav a:hover {
        opacity: 1;
        color: var(--primary-hover);
      }

      /* Bottom Controls */
      footer {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        pointer-events: auto;
      }

      .audio-btn {
        background: var(--surface);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 0.75rem 1.5rem;
        border-radius: 30px;
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .audio-btn:hover {
        border-color: rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.05);
      }

      .audio-indicator {
        display: flex;
        gap: 2px;
        height: 12px;
        align-items: flex-end;
      }

      .audio-bar {
        width: 2px;
        background-color: currentColor;
        height: 2px;
        transition: height 0.1s ease;
      }

      .audio-btn.playing .audio-bar {
        animation: eq 1s ease-in-out infinite alternate;
      }
      .audio-btn.playing .audio-bar:nth-child(1) { animation-delay: 0.0s; }
      .audio-btn.playing .audio-bar:nth-child(2) { animation-delay: 0.2s; }
      .audio-btn.playing .audio-bar:nth-child(3) { animation-delay: 0.4s; }
      .audio-btn.playing .audio-bar:nth-child(4) { animation-delay: 0.1s; }

      @keyframes eq {
        0% { height: 2px; }
        50% { height: 12px; }
        100% { height: 2px; }
      }

      /* Optional custom scroll for virtual scrolling if needed */
      #virtual-scroll-space {
        position: absolute;
        top: 0;
        left: 0;
        width: 1px;
        height: 400vh; /* creates 4 screens of scrolling for blooming effect */
        pointer-events: none;
        z-index: 0;
      }

      @media (max-width: 768px) {
        #ui-layer { padding: 1.5rem; }
        nav { display: none; } /* Hide text nav on mobile for cleaner look */
      }
    </style>
  </head>
  <body>
    <!-- Virtual scroll element to provide native scrollbars while visual is fixed -->
    <div id="virtual-scroll-space"></div>

    <div id="canvas-container"></div>
    <div id="interaction-layer"></div>
    
    <div id="ui-layer">
      <header>
        <div class="logo-container">
          <img src="/inkblotstudio_logo.svg" alt="Inkblot Studio Logo">
          <span>INKBLOT STUDIO</span>
        </div>
        <nav>
          <a href="#">Showcase</a>
          <a href="#">Products</a>
          <a href="#">Contact</a>
        </nav>
      </header>

      <footer>
        <button id="audio-toggle" class="audio-btn">
          <span>Audio: Off</span>
          <div class="audio-indicator">
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
          </div>
        </button>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
