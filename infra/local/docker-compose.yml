services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inkblot
      POSTGRES_USER: inkblot
      POSTGRES_PASSWORD: inkblot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkblot -d inkblot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://inkblot:inkblot@postgres:5432/inkblot
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
      LEAD_WEBHOOK_URL: ""
      PUBLIC_ANALYTICS_ENDPOINT: ""
      SENTRY_DSN: ""
    ports:
      - "4321:4321"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../../web
      dockerfile: Dockerfile
    command: ["npm", "run", "worker"]
    environment:
      DATABASE_URL: postgres://inkblot:inkblot@postgres:5432/inkblot
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
      LEAD_WEBHOOK_URL: ""
      SENTRY_DSN: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
